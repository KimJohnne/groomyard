<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Groomyard Barbershop — Dennis Pritt Road, Nairobi</title>
<meta name="description" content="Groomyard Barbershop, Dennis Pritt Road, Nairobi. Premium barbershop for fades, beard trims, hot towel shaves, and massage. Rated 4.7 stars. Book your cut today."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --charcoal:  #1c1c1c;
  --charcoal-2:#242424;
  --charcoal-3:#2e2e2e;
  --steel:     #3a3a3a;
  --copper:    #b87333;
  --copper-l:  #d4904a;
  --copper-d:  #8a5520;
  --cream:     #f5f0e8;
  --cream-2:   #ede7dc;
  --smoke:     #8a8a8a;
  --light:     #c8c0b4;
  --border:    rgba(184,115,51,.15);
  --font-h:    'Bebas Neue', sans-serif;
  --font-b:    'Barlow', sans-serif;
  --ease:      cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--charcoal);color:var(--cream);line-height:1.7;overflow-x:hidden}
::selection{background:var(--copper);color:#fff}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--copper);border-radius:2px}
img{display:block;width:100%;height:100%;object-fit:cover}
.container{max-width:1120px;margin:0 auto;padding:0 36px}
.sp{padding:96px 0}
.fu{opacity:0;transform:translateY(20px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
.fu.vis{opacity:1;transform:translateY(0)}
.fu.d1{transition-delay:.1s}.fu.d2{transition-delay:.2s}.fu.d3{transition-delay:.3s}

.btn-copper{display:inline-flex;align-items:center;gap:8px;background:var(--copper);color:#fff;padding:13px 28px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;border-radius:2px;transition:background .2s,transform .2s;text-decoration:none}
.btn-copper:hover{background:var(--copper-d);transform:translateY(-2px)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--copper);border:1.5px solid var(--copper);padding:12px 26px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;text-decoration:none}
.btn-outline:hover{background:var(--copper);color:#fff}
.btn-outline-cream{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--cream);border:1.5px solid rgba(245,240,232,.25);padding:12px 26px;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;text-decoration:none}
.btn-outline-cream:hover{border-color:var(--cream);background:rgba(245,240,232,.08)}

nav{position:fixed;top:0;left:0;right:0;z-index:300;transition:background .3s,border-color .3s}
nav.solid{background:rgba(28,28,28,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(184,115,51,.12)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
.nav-logo{cursor:pointer;text-decoration:none}
.nl-main{font-family:var(--font-h);font-size:24px;color:var(--cream);letter-spacing:3px;line-height:1}
.nl-sub{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--copper);margin-top:3px}
.nav-links{display:flex;align-items:center;list-style:none}
.nav-links a{padding:0 16px;height:68px;display:flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.5);text-decoration:none;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--copper);border-bottom-color:var(--copper)}
.hbg{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
.hbg span{display:block;width:22px;height:2px;background:var(--cream);border-radius:1px}

#app{transition:opacity .2s}
#app.fading{opacity:0}

footer{background:var(--charcoal-2);padding:64px 0 0;border-top:1px solid rgba(184,115,51,.1)}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;padding-bottom:48px}
.ft-logo-name{font-family:var(--font-h);font-size:26px;color:var(--cream);letter-spacing:3px}
.ft-logo-tag{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--copper);margin-top:4px}
.ft-desc{color:rgba(245,240,232,.4);font-size:13px;font-weight:300;line-height:1.8;margin-top:14px;max-width:240px}
.ft-col h4{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--copper);margin-bottom:16px;font-weight:700}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.ft-col a,.ft-col li{color:rgba(245,240,232,.4);font-size:13px;font-weight:300;text-decoration:none;cursor:pointer;transition:color .2s}
.ft-col a:hover{color:var(--copper)}
.ft-bot{border-top:1px solid rgba(184,115,51,.08);padding:20px 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ft-bot p{color:rgba(245,240,232,.2);font-size:12px}
.ft-credit{color:rgba(184,115,51,.3)!important}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--smoke)}
.fg input,.fg select,.fg textarea{background:var(--charcoal-3);border:1px solid rgba(184,115,51,.15);color:var(--cream);padding:12px 14px;font-family:var(--font-b);font-size:14px;font-weight:400;border-radius:2px;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--copper)}
.fg select option{background:var(--charcoal-3)}
.fg textarea{resize:vertical}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

@media(max-width:1024px){.ft-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  .nav-links,.nav-bk{display:none}
  .hbg{display:flex}
  nav.open .nav-links{display:flex;flex-direction:column;position:absolute;top:68px;left:0;right:0;background:var(--charcoal);border-bottom:1px solid rgba(184,115,51,.1);padding:8px 0;gap:0}
  nav.open .nav-links a{height:46px;padding-left:24px;color:rgba(245,240,232,.6);border-bottom:1px solid rgba(184,115,51,.06)}
  .fr2{grid-template-columns:1fr}
  .ft-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav id="nav">
  <div class="container nav-inner">
    <div class="nav-logo" onclick="go('home')">
      <div class="nl-main">GROOMYARD</div>
      <div class="nl-sub">Barbershop · Nairobi</div>
    </div>
    <ul class="nav-links">
      <li><a onclick="go('home')">Home</a></li>
      <li><a onclick="go('services')">Services</a></li>
      <li><a onclick="go('contact')">Book a Cut</a></li>
    </ul>
    <button class="btn-copper nav-bk" onclick="go('contact')" style="font-size:11px;padding:10px 20px">Book Now</button>
    <button class="hbg" id="hbg"><span></span><span></span><span></span></button>
  </div>
</nav>

<div id="app"></div>

<style>
.hero{height:100vh;min-height:680px;position:relative;overflow:hidden;display:flex;align-items:center}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=1800&q=85&fit=crop') center/cover no-repeat}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(100deg,rgba(28,28,28,.95) 0%,rgba(28,28,28,.7) 50%,rgba(28,28,28,.2) 100%)}
.hero-con{position:relative;z-index:2;padding:120px 0 80px;width:100%}
.hero-inner{max-width:640px}
.hero-tag{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(184,115,51,.4);padding:6px 16px;border-radius:2px;margin-bottom:28px}

@keyframes cp{0%,100%{opacity:1}50%{opacity:.4}}
.htag-txt{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--copper)}
.hero h1{font-family:var(--font-h);font-size:clamp(64px,9vw,130px);color:var(--cream);line-height:.88;letter-spacing:2px;margin-bottom:20px}
.hero h1 .hl{color:var(--copper)}
.hero-sub{color:rgba(245,240,232,.6);font-size:16px;font-weight:300;line-height:1.85;max-width:420px;margin-bottom:36px}
.hero-acts{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:48px}
.hero-creds{display:flex;gap:32px;border-top:1px solid rgba(184,115,51,.15);padding-top:24px}
.hc-n{font-family:var(--font-h);font-size:32px;color:var(--copper);line-height:1;letter-spacing:1px}
.hc-l{font-size:10px;color:rgba(245,240,232,.4);font-weight:300;margin-top:4px;letter-spacing:1px}

/* services strip */
.svc-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(184,115,51,.12)}
.ss-item{background:var(--charcoal-2);padding:28px 24px;border-top:2px solid transparent;transition:all .25s;cursor:pointer}
.ss-item:hover{background:var(--charcoal-3);border-top-color:var(--copper)}
.ss-icon{font-size:28px;margin-bottom:12px}
.ss-name{font-family:var(--font-h);font-size:20px;color:var(--cream);letter-spacing:1px;margin-bottom:4px}
.ss-desc{font-size:12px;color:var(--smoke);font-weight:300;line-height:1.55}
.ss-price{font-size:14px;font-weight:700;color:var(--copper);margin-top:10px}

/* barbers */
.barbers-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:rgba(184,115,51,.1)}
.barber-card{background:var(--charcoal-2);overflow:hidden;display:grid;grid-template-columns:220px 1fr;gap:0}
.barber-img{height:260px;overflow:hidden;position:relative}
.barber-img img{filter:grayscale(20%);transition:transform .5s,filter .4s}
.barber-card:hover .barber-img img{transform:scale(1.04);filter:grayscale(0%)}
.barber-info{padding:32px 28px;display:flex;flex-direction:column;justify-content:center}
.barber-name{font-family:var(--font-h);font-size:28px;color:var(--cream);letter-spacing:2px;margin-bottom:4px}
.barber-role{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--copper)}
.barber-bio{font-size:13px;color:var(--smoke);font-weight:300;line-height:1.65;margin-top:10px}
.barber-specs{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.bs-tag{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border:1px solid rgba(184,115,51,.2);color:var(--copper);border-radius:2px}

/* photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);height:320px;gap:2px}
.pg-item{overflow:hidden;cursor:pointer}
.pg-item img{filter:brightness(.8) saturate(.85);transition:transform .5s,filter .4s}
.pg-item:hover img{transform:scale(1.06);filter:brightness(.95) saturate(1)}

/* reviews */
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.rev-card{background:var(--charcoal-2);border:1px solid rgba(184,115,51,.1);padding:24px;border-radius:2px;border-left:3px solid var(--copper)}
.rs{color:var(--copper);font-size:12px;margin-bottom:10px}
.rt{font-style:italic;color:var(--cream);font-size:14px;line-height:1.7;margin-bottom:16px;font-weight:300;opacity:.85}
.rn{font-size:12px;font-weight:700;color:var(--cream);opacity:.7}
.rc{font-size:10px;color:var(--copper);letter-spacing:1px;text-transform:uppercase;margin-top:3px}

/* cta */
.cta{background:var(--copper);padding:80px 0;text-align:center;position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.15) 0%,transparent 100%)}
.cta-con{position:relative;z-index:1}

@media(max-width:1024px){
  .svc-strip{grid-template-columns:1fr 1fr}
  .rev-grid{grid-template-columns:1fr 1fr}
  .barbers-grid{grid-template-columns:1fr}
  .photo-grid{grid-template-columns:1fr 1fr;height:auto}
  .pg-item{height:180px}
}
@media(max-width:768px){
  .barber-card{grid-template-columns:1fr}
  .barber-img{height:240px}
  .svc-strip{grid-template-columns:1fr 1fr}
  .rev-grid{grid-template-columns:1fr}
  .photo-grid{grid-template-columns:1fr 1fr}
}
</style>

<!-- WHY GROOMYARD -->

  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center">

      <div class="fu d1">

<script>
let cur='home';const app=document.getElementById('app');
function go(page){
  if(page===cur&&app.innerHTML){window.scrollTo({top:0,behavior:'smooth'});return}
  app.classList.add('fading');
  setTimeout(()=>{
    cur=page;const tpl=document.getElementById('t-'+page);const ft=document.getElementById('t-footer');
    if(!tpl)return;app.innerHTML=tpl.innerHTML+ft.innerHTML;app.classList.remove('fading');
    window.scrollTo({top:0,behavior:'instant'});updateNav();initPage(page);revealImgs();
  },200);
}
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('solid',window.scrollY>50||cur!=='home'));
document.getElementById('hbg').addEventListener('click',()=>nav.classList.toggle('open'));
function updateNav(){
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  const m={home:0,services:1,contact:2};const links=document.querySelectorAll('.nav-links a');
  if(links[m[cur]])links[m[cur]].classList.add('active');
  if(cur==='home')nav.classList.toggle('solid',window.scrollY>50);else nav.classList.add('solid');
}
function initPage(page){
  setTimeout(()=>{
    const obs=new IntersectionObserver((entries)=>{entries.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('vis'),i*80)});},{threshold:.07});
    document.querySelectorAll('.fu').forEach(el=>obs.observe(el));
  },50);
  if(page==='contact'){
    const form=document.getElementById('bkForm');
    if(form)form.addEventListener('submit',function(e){
      e.preventDefault();const btn=this.querySelector('button[type="submit"]');
      btn.textContent='✓ BOOKING CONFIRMED — see you soon!';btn.style.background='#1a6b30';btn.disabled=true;
    });
  }
}
function revealImgs(){
  setTimeout(()=>{document.querySelectorAll('img').forEach(img=>{img.style.transition='opacity .4s';if(img.complete)img.style.opacity='1';else{img.style.opacity='0';img.onload=()=>img.style.opacity='1'}});},80);
}
go('home');
</script>
